[common]
mode = client
server_addr = 2001:db8::10
server_port = 7000
client_id = vps-sg
identity_private_key = /etc/ctunnel/client.key
server_public_key = /etc/ctunnel/server.pub
allowed_ciphers = xchacha20-poly1305
preferred_cipher = xchacha20-poly1305
heartbeat_interval = 20
heartbeat_timeout = 60
handshake_timeout = 10
connect_timeout = 5
reconnect_initial_delay = 1
reconnect_max_delay = 30
reconnect_jitter_percent = 20
pool_count = 2
default_data_encryption = required
log_level = info

[ssh]
type = tcp
remote_addr = ::
remote_port = 2222
local_addr = 127.0.0.1
local_port = 22
data_encryption = disabled

[web]
type = tcp
remote_addr = ::
remote_port = 8080
local_addr = 127.0.0.1
local_port = 8080
data_encryption = required
