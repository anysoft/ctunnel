[common]
mode = server
bind_addr = ::
bind_port = 7000
identity_private_key = /etc/ctunnel/server.key
authorized_clients_file = /etc/ctunnel/clients.ini
allowed_ciphers = xchacha20-poly1305
preferred_cipher = xchacha20-poly1305
control_encryption = required
auth_mode = public-key
heartbeat_interval = 20
heartbeat_timeout = 60
handshake_timeout = 10
max_clients = 4
max_services_per_client = 16
max_streams_per_client = 64
max_pending_streams = 16
log_level = info
