name: Cross builds
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  linux-native-mini:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Environment diagnostics
        shell: bash
        run: |
          uname -a
          uname -m
          cmake --version || true
          ninja --version || true
          python3 --version || true
          cc --version || true
      - name: Install dependencies
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build binutils file zip
      - name: Configure
        shell: bash
        run: |
          python3 scripts/kconfig/configure.py --config build/.config --build-dir build --target linux defconfig configs/mini_defconfig
          scripts/config --file build/.config --build-dir build --target linux --enable CTUNNEL_LINK_MOSTLY_STATIC
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=MinSizeRel -DCTUNNEL_KCONFIG_CONFIG=build/.config -DCTUNNEL_USE_BUNDLED_MONOCYPHER=ON -DCTUNNEL_BUILD_TESTS=OFF
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --parallel --verbose 2>&1 | tee build/build.log
      - name: Verify and package
        shell: bash
        run: |
          set -o pipefail
          file build/ctunnel | tee build/architecture.txt
          otool -L build/ctunnel 2>/dev/null || readelf -W -d build/ctunnel | tee build/dynamic.txt || true
          scripts/check-binary-config.sh build/ctunnel server-only mini
          CTUNNEL_MAX_MINI_BINARY_SIZE_KIB=400 scripts/size-report.sh build/ctunnel | tee build/size-report.txt
          version="0.1.0-dev+$(printf %s "$GITHUB_SHA" | cut -c1-12)"
          case "$GITHUB_REF" in refs/tags/v*) version=${GITHUB_REF_NAME#v};; esac
          CTUNNEL_STRIP=strip VERSION="$version" TARGET=linux-x86_64-mini BINARY=build/ctunnel CONFIG=build/.config scripts/package.sh
      - uses: actions/upload-artifact@v7
        with:
          name: release-package-linux-x86_64-mini
          path: ctunnel-*.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: debug-linux-x86_64-mini
          path: |
            build/.config
            build/CMakeCache.txt
            build/build.log
            build/ctunnel.link-report.txt
            build/architecture.txt
            build/dynamic.txt
            build/size-report.txt
          if-no-files-found: warn

  linux-cross-mostly-static:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - {name: linux-i686-mostly-static, host: i686-linux-gnu, apt: gcc-i686-linux-gnu, tc: linux-i686.cmake, expect: "Intel 80386"}
          - {name: linux-aarch64-mostly-static, host: aarch64-linux-gnu, apt: gcc-aarch64-linux-gnu, tc: linux-aarch64.cmake, expect: "ARM aarch64"}
          - {name: linux-armv7-gnueabihf-mostly-static, host: arm-linux-gnueabihf, apt: gcc-arm-linux-gnueabihf, tc: linux-armv7.cmake, expect: "ARM"}
          - {name: linux-mips-mostly-static, host: mips-linux-gnu, apt: gcc-mips-linux-gnu, tc: linux-mips.cmake, expect: "MIPS"}
          - {name: linux-mipsel-mostly-static, host: mipsel-linux-gnu, apt: gcc-mipsel-linux-gnu, tc: linux-mipsel.cmake, expect: "MIPS"}
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build binutils file zip ${{ matrix.apt }}
      - name: Environment diagnostics
        shell: bash
        run: |
          uname -a
          uname -m
          cmake --version
          ninja --version
          python3 --version
          ${{ matrix.host }}-gcc --version
          ${{ matrix.host }}-gcc -dumpmachine
          ${{ matrix.host }}-gcc -print-sysroot || true
          ${{ matrix.host }}-gcc -print-file-name=libc.a || true
          ${{ matrix.host }}-gcc -print-file-name=crt1.o || true
      - name: Configure
        shell: bash
        run: |
          echo "CTUNNEL_CROSS_PREFIX=${{ matrix.host }}-" >> "$GITHUB_ENV"
          python3 scripts/kconfig/configure.py --config build/.config --build-dir build --target linux defconfig configs/mini_defconfig
          scripts/config --file build/.config --build-dir build --target linux --enable CTUNNEL_LINK_MOSTLY_STATIC
          cmake -S . -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/${{ matrix.tc }} -DCMAKE_BUILD_TYPE=MinSizeRel -DCTUNNEL_KCONFIG_CONFIG=build/.config -DCTUNNEL_USE_BUNDLED_MONOCYPHER=ON -DCTUNNEL_BUILD_TESTS=OFF
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --verbose 2>&1 | tee build/build.log
      - name: Verify and package
        shell: bash
        run: |
          set -o pipefail
          file build/ctunnel | tee build/architecture.txt
          grep -E '${{ matrix.expect }}' build/architecture.txt
          ${{ matrix.host }}-readelf -W -h build/ctunnel | tee build/elf-header.txt
          ${{ matrix.host }}-readelf -W -l build/ctunnel | tee build/program-headers.txt
          ${{ matrix.host }}-readelf -W -d build/ctunnel | tee build/dynamic.txt
          ! grep -Eiq 'sodium|ssl|crypto|mbedtls|monocypher' build/dynamic.txt
          scripts/check-binary-config.sh build/ctunnel server-only mini
          CTUNNEL_FILE=file CTUNNEL_STRIP=${{ matrix.host }}-strip CTUNNEL_SIZE=${{ matrix.host }}-size CTUNNEL_NM=${{ matrix.host }}-nm CTUNNEL_READELF=${{ matrix.host }}-readelf CTUNNEL_OBJDUMP=${{ matrix.host }}-objdump CTUNNEL_MAX_MINI_BINARY_SIZE_KIB=400 scripts/size-report.sh build/ctunnel | tee build/size-report.txt
          version="0.1.0-dev+$(printf %s "$GITHUB_SHA" | cut -c1-12)"
          case "$GITHUB_REF" in refs/tags/v*) version=${GITHUB_REF_NAME#v};; esac
          CTUNNEL_STRIP=${{ matrix.host }}-strip VERSION="$version" TARGET=${{ matrix.name }}-mini BINARY=build/ctunnel CONFIG=build/.config scripts/package.sh
      - uses: actions/upload-artifact@v7
        with:
          name: release-package-${{ matrix.name }}-mini
          path: ctunnel-*.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: debug-${{ matrix.name }}-mini
          path: |
            build/.config
            build/CMakeCache.txt
            build/build.log
            build/ctunnel.link-report.txt
            build/architecture.txt
            build/elf-header.txt
            build/program-headers.txt
            build/dynamic.txt
            build/size-report.txt
          if-no-files-found: warn

  linux-armv7-gnueabihf-static-probe:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - shell: bash
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build binutils file gcc-arm-linux-gnueabihf
      - name: Static toolchain probe
        shell: bash
        run: |
          arm-linux-gnueabihf-gcc -print-sysroot
          libc=$(arm-linux-gnueabihf-gcc -print-file-name=libc.a)
          crt1=$(arm-linux-gnueabihf-gcc -print-file-name=crt1.o)
          test "$libc" != libc.a
          test "$crt1" != crt1.o
          echo "CTUNNEL_CROSS_PREFIX=arm-linux-gnueabihf-" >> "$GITHUB_ENV"
      - name: Configure and build fully static
        shell: bash
        run: |
          python3 scripts/kconfig/configure.py --config build/.config --build-dir build --target linux defconfig configs/mini_defconfig
          scripts/config --file build/.config --build-dir build --target linux --enable CTUNNEL_LINK_STATIC
          cmake -S . -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/linux-armv7.cmake -DCMAKE_BUILD_TYPE=MinSizeRel -DCTUNNEL_KCONFIG_CONFIG=build/.config -DCTUNNEL_USE_BUNDLED_MONOCYPHER=ON -DCTUNNEL_BUILD_TESTS=OFF
          cmake --build build --verbose 2>&1 | tee build/build.log
          arm-linux-gnueabihf-readelf -W -l build/ctunnel | tee build/program-headers.txt
          arm-linux-gnueabihf-readelf -W -d build/ctunnel | tee build/dynamic.txt
          ! grep -Eq '(^|[[:space:]])INTERP([[:space:]]|$)' build/program-headers.txt
          ! grep -q NEEDED build/dynamic.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: debug-linux-armv7-gnueabihf-static-probe
          path: build/**
          if-no-files-found: warn

  macos-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: macos-15-intel, name: macos-x86_64, expect: "x86_64"}
          - {os: macos-15, name: macos-arm64, expect: "arm64"}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Environment diagnostics
        shell: bash
        run: |
          uname -a
          uname -m
          cmake --version
          python3 --version
          cc --version
      - name: Configure and build
        shell: bash
        run: |
          python3 scripts/kconfig/configure.py --config build/.config --build-dir build --target darwin defconfig configs/mini_defconfig
          scripts/config --file build/.config --build-dir build --target darwin --enable CTUNNEL_LINK_MOSTLY_STATIC
          cmake -S . -B build -DCMAKE_BUILD_TYPE=MinSizeRel -DCTUNNEL_KCONFIG_CONFIG=build/.config -DCTUNNEL_BUILD_TESTS=OFF
          cmake --build build --parallel --verbose 2>&1 | tee build/build.log
      - name: Verify and package
        shell: bash
        run: |
          set -o pipefail
          test "$(uname -m)" = '${{ matrix.expect }}'
          file build/ctunnel | tee build/architecture.txt
          grep '${{ matrix.expect }}' build/architecture.txt
          otool -L build/ctunnel | tee build/dependencies.txt
          ! grep -Eiq 'sodium|ssl|crypto|mbedtls|monocypher' build/dependencies.txt
          scripts/check-binary-config.sh build/ctunnel server-only mini
          scripts/size-report.sh build/ctunnel | tee build/size-report.txt
          version="0.1.0-dev+$(printf %s "$GITHUB_SHA" | cut -c1-12)"
          case "$GITHUB_REF" in refs/tags/v*) version=${GITHUB_REF_NAME#v};; esac
          CTUNNEL_STRIP=strip VERSION="$version" TARGET=${{ matrix.name }}-mini BINARY=build/ctunnel CONFIG=build/.config scripts/package.sh
      - uses: actions/upload-artifact@v7
        with:
          name: release-package-${{ matrix.name }}-mini
          path: ctunnel-*.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: debug-${{ matrix.name }}-mini
          path: |
            build/.config
            build/CMakeCache.txt
            build/build.log
            build/ctunnel.link-report.txt
            build/architecture.txt
            build/dependencies.txt
            build/size-report.txt
          if-no-files-found: warn

  windows-mingw:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - {msystem: MINGW64, pkg: x86_64, prefix: x86_64-w64-mingw32, name: windows-x86_64, arch: "PE32+"}
          - {msystem: MINGW32, pkg: i686, prefix: i686-w64-mingw32, name: windows-i686, arch: "PE32 executable"}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            python
            mingw-w64-${{ matrix.pkg }}-gcc
            mingw-w64-${{ matrix.pkg }}-cmake
            mingw-w64-${{ matrix.pkg }}-ninja
            zip
      - name: Environment diagnostics
        run: |
          echo "$MSYSTEM"
          echo "$PATH"
          which python || true
          python --version
          which cmake
          cmake --version
          which gcc
          gcc --version
      - name: Configure
        run: |
          echo "CTUNNEL_CROSS_PREFIX=${{ matrix.prefix }}-" >> "$GITHUB_ENV"
          python scripts/kconfig/configure.py --config build/.config --build-dir build --target windows defconfig configs/mini_defconfig
          scripts/config --file build/.config --build-dir build --target windows --enable CTUNNEL_LINK_STATIC
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=MinSizeRel -DCTUNNEL_KCONFIG_CONFIG=build/.config -DCTUNNEL_BUILD_TESTS=OFF
      - name: Build
        run: |
          set -o pipefail
          cmake --build build --verbose 2>&1 | tee build/build.log
      - name: Verify and package
        run: |
          set -o pipefail
          file build/ctunnel.exe | tee build/architecture.txt
          grep '${{ matrix.arch }}' build/architecture.txt
          objdump -p build/ctunnel.exe | tee build/dependencies.txt
          ! grep -Eiq 'sodium|ssl|crypto|mbedtls|monocypher|libgcc_s|libwinpthread|libstdc\\+\\+' build/dependencies.txt
          CTUNNEL_OBJDUMP=objdump scripts/size-report.sh build/ctunnel.exe | tee build/size-report.txt
          version="0.1.0-dev+$(printf %s "$GITHUB_SHA" | cut -c1-12)"
          case "$GITHUB_REF" in refs/tags/v*) version=${GITHUB_REF_NAME#v};; esac
          CTUNNEL_STRIP=strip VERSION="$version" TARGET=${{ matrix.name }}-mini-static-runtime BINARY=build/ctunnel.exe CONFIG=build/.config scripts/package.sh
      - uses: actions/upload-artifact@v7
        with:
          name: release-package-${{ matrix.name }}-mini-static-runtime
          path: ctunnel-*.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: debug-${{ matrix.name }}-mini-static-runtime
          path: |
            build/.config
            build/CMakeCache.txt
            build/build.log
            build/ctunnel.exe.link-report.txt
            build/architecture.txt
            build/dependencies.txt
            build/size-report.txt
          if-no-files-found: warn
